<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Multi Time Zone Digital Clock</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Multi Time Zone Clock</h1>

    <section class="controls">
      <label for="presetZones">Add preset time zone:</label>
      <select id="presetZones"></select>
      <button id="addPreset">Add</button>

      <label for="customZone">Or add a custom IANA zone (e.g. "America/Los_Angeles"):</label>
      <input id="customZone" placeholder="e.g. Europe/Berlin" />
      <button id="addCustom">Add</button>
    </section>

    <section id="clocks" class="clocks"></section>

    <footer>
      <small>Local time zone: <span id="localTz"></span></small>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
